<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GymPilot – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      "https://YOUR-PROJECT-ID.supabase.co",
      "YOUR-ANON-PUBLIC-KEY"
    );
  </script>
</head>
<body>
<header>
  <div class="nav">
    <div class="nav-left">
      <div class="logo-mark">GP</div>
      <div class="logo-text">GymPilot</div>
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="features.html">Features</a>
      <a href="pricing.html">Pricing</a>
    </nav>
    <div class="nav-cta" id="auth-buttons"></div>
  </div>
</header>

<main>
  <section class="section">
    <div class="section-header">
      <div>
        <div class="section-kicker">Dashboard</div>
        <h1 class="section-title">Your GymPilot command centre.</h1>
      </div>
      <p class="section-subtitle">
        Quick snapshot of your account. This is where you’ll eventually link into your Clixio CRM workspace.
      </p>
    </div>

    <div class="card">
      <p id="user-email" style="font-size:0.9rem; color:var(--muted); margin:0 0 0.75rem;"></p>
      <button class="btn btn-outline" id="signout-btn">Sign Out</button>
    </div>
  </section>
</main>

<footer>
  © <span id="year"></span> GymPilot. All rights reserved.
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();

  async function initDashboard() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      window.location.href = "login.html";
      return;
    }

    document.getElementById("user-email").textContent =
      "Signed in as " + session.user.email;

    document.getElementById("signout-btn").onclick = async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    };

    const box = document.getElementById("auth-buttons");
    box.innerHTML = `
      <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
      <span style="color:#b3b3b3; font-size:0.8rem;">
        ${session.user.email}
      </span>
      <button class="btn btn-outline" id="nav-signout-btn">Sign Out</button>
    `;
    document.getElementById("nav-signout-btn").onclick = async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    };
  }

  initDashboard();
</script>
</body>
</html>
